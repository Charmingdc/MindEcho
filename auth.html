<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, inital-scale=1">
  <meta name="author" content="Adebayo Muis, Charmingdc">
  <meta name="keywords" content="MindEcho, Mental support, mental health, ai mental coach, mood logging, personalized quotes, healthier you, insightful resources, emotional journey">
  <meta name="description" content="MindEcho empowers your emotional journey with mood logging, personalized quotes, and insightful resources for a happier, healthier you.">
  
    <!-- Add favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/public/mindecho.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/public/mindecho.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/public/mindecho.png">
  <link rel="mask-icon" href="/public/mindecho.png" color="rgb(24, 29, 34)">
  
  
   <!-- link to import font awesome library -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  
  <!-- Notyf Library CSS  -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
    
  
  <!-- Notyf Library JS -->
  <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
  
  
  <!-- link to css stylesheet -->
  <link rel="stylesheet" href="./src/styles/auth.css">
 
 
  <!-- Imported Poppins font from Google fonts -->
  <style>
   @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
  </style>
 
  
  <title>
   MindEcho - Be Happier
  </title>
 </head>
 <body>
  
  <main>
   
   <section id="signup-sec">
     <form id="signup-form">
      
       <h1>
        MindEcho
       </h1>
       <p>
        Embark on your emotional journey 🤗
       </p>
      
       <div class="group">
         <img src="./src/assets/icons/usr.svg" alt="user icon" class="icon">
         <input type="text" name="username" placeholder="Enter your username" class="input"  id="username">
       </div>
       
       
       <div class="group">
         <img src="./src/assets/icons/mail.svg" alt="email icon" class="icon">
         <input type="email" name="email" placeholder="Enter a valid email" class="input"  id="email">
       </div>
       
       
        <div class="group">
         <img src="./src/assets/icons/lock.svg" alt="lock icon" class="icon">
         <input type="password" name="password" placeholder="password" class="input" id="password">
          <i class="fa-regular fa-eye psw-toggle" id="signup-psw-toggle"></i>
       </div>
       
       <button id="signup-proceed">
         create account
       </button>
       
       <p>
        or
       </p>
       
       <a id="goto-login">
         login to your account
       </a>
       
     </form>
   </section>
   
   
   <section class="show-sec" id="login-sec">
 
     <form id="login-form">
      
       <h1>
        MindEcho
       </h1>
       <p>
        Welcome back, happier you 🤗
       </p>
      
       <div class="group">
         <img src="./src/assets/icons/usr.svg" alt="user icon" class="icon">
         <input type="text" name="username" placeholder="Enter your username" class="input"  id="username">
       </div>
       
       
        <div class="group">
         <img src="./src/assets/icons/lock.svg" alt="lock icon" class="icon">
         <input type="password" name="password" placeholder="password" class="input" id="password">
         <i class="fa-regular fa-eye psw-toggle" id="login-psw-toggle"></i>
       </div>
       
       <button>
         Proceed to login
       </button>
       
       <p>
        or
       </p>
       
       <a id="goto-signup">
         create an account
       </a>
       
     </form>
   </section>
   
  </main>
  
  <script src="./src/scripts/auth/init.js" type="module" defer></script>
 </body>
</html>
